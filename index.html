<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <form action="" method="POST">
        
        <h1>­­Bem-vindo</h1>
        <br>

        <div class="form-group">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo.">
        </div>

        <div class="form-group">
            <label for="data_nascimento">Data de Nascimento:</label>
            <input type="date" id="data_nascimento" name="data_nascimento" placeholder="Digite sua data de nascimento.">
        </div>

        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Digite seu email.">
        </div>

        <div class="form-group">
            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha" placeholder="Defina sua senha.">
        </div>

        <div class="form-group">
            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" name="telefone" placeholder="(**) *****-****.">
        </div>

        <div class="form-group">
            <label>Habilidades:</label>

            <label for="html">
                <input type="checkbox" id="html" name="habilidades" value="HTML">
                HTML
            </label>

            <label for="css">
                <input type="checkbox" id="css" name="habilidades" value="CSS">
                CSS
            </label>

            <label for="js">
                <input type="checkbox" id="js" name="habilidades" value="JS">
                JavaScript
            </label>
        </div>

        <div class="form-group">
            <label for="pais">País:</label>

            <select id="pais" name="pais">

                <option value="">Selecione</option>
                <option value="br">Brasil</option>
                <option value="jp">Japão</option>
                <option value="ca">Canadá</option>
                <option value="ru">Rússia</option>
                <option value="us">Estados Unidos</option>

            </select>
        </div>

        <div class="form-group">
            <label for="comentarios">Comentários:</label>

            <textarea id="comentarios" name="comentarios"></textarea>
        </div>

        <div class="form-group">
            <button type="submit">Enviar</button>
        </div>

    </form>

</body>

</html>
